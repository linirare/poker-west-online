name: Deploy to Railway

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli@5.2.0

      - name: Deploy
        run: railway up --ci --service lirare --environment production
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
